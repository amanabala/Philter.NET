name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Philter.NET.sln

      - name: Build (Release)
        run: dotnet build Philter.NET.sln -c Release --no-restore

      # Tests run on net8.0 + net10.0. The Catalyst-backed tests restore the ~100 MB
      # Catalyst.Models.English package, so this job is download-heavy until Catalyst
      # is split out of this repo (see CHANGELOG / README — perceptron is the default).
      - name: Test (Release)
        run: dotnet test Philter.NET.sln -c Release --no-build --verbosity normal
