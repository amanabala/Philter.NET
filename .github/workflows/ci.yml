name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Philter.NET.sln

      - name: Build (Release)
        run: dotnet build Philter.NET.sln -c Release --no-restore

      # Tests run on net8.0 + net10.0 with the pure-managed perceptron tagger (default) —
      # no heavy model downloads (see CHANGELOG / README).
      - name: Test (Release)
        run: dotnet test Philter.NET.sln -c Release --no-build --verbosity normal
